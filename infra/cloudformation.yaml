AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Orbweaver infrastructure stack.
  Manages all AWS resources for the distributed web crawler.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Deployment environment.

  URLQueueVisibilityTimeout:
    Type: Number
    Default: 300
    Description: >
      Visibility timeout in seconds for the URL queue.
      Should be at least as long as the crawl worker's
      maximum processing time.

  ParserQueueVisibilityTimeout:
    Type: Number
    Default: 300
    Description: >
      Visibility timeout in seconds for the parser queue.
      Should be at least as long as the parser worker's
      maximum processing time.

  MaxReceiveCount:
    Type: Number
    Default: 3
    Description: >
      Number of times a message can be received from the URL queue
      before being sent to the dead-letter queue.

  MessageRetentionPeriod:
    Type: Number
    Default: 1209600
    Description: >
      Message retention period in seconds (default 14 days).

  VpcCIDR:
    Type: String
    Default: "10.0.0.0/16"
    Description: CIDR block for the VPC.

  PrivateSubnet1CIDR:
    Type: String
    Default: "10.0.1.0/24"
    Description: CIDR block for private subnet 1.

  PrivateSubnet2CIDR:
    Type: String
    Default: "10.0.2.0/24"
    Description: CIDR block for private subnet 2.

  RedisNodeType:
    Type: String
    Default: cache.t3.micro
    Description: ElastiCache instance type for Redis.

  PublicSubnetCIDR:
    Type: String
    Default: "10.0.0.0/24"
    Description: CIDR block for the public subnet (hosts NAT Gateway).

  RedisPort:
    Type: Number
    Default: 6379
    Description: Port for the Redis cluster.

Resources:
  URLDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "orbweaver-url-dlq-${Environment}"
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      Tags:
        - Key: Project
          Value: orbweaver
        - Key: Environment
          Value: !Ref Environment

  ParserDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "orbweaver-parser-dlq-${Environment}"
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      Tags:
        - Key: Project
          Value: orbweaver
        - Key: Environment
          Value: !Ref Environment

  ParserQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "orbweaver-parser-queue-${Environment}"
      VisibilityTimeout: !Ref ParserQueueVisibilityTimeout
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt ParserDeadLetterQueue.Arn
        maxReceiveCount: !Ref MaxReceiveCount
      Tags:
        - Key: Project
          Value: orbweaver
        - Key: Environment
          Value: !Ref Environment

  HTMLStorageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "orbweaver-html-storage-${Environment}"
      Tags:
        - Key: Project
          Value: orbweaver
        - Key: Environment
          Value: !Ref Environment

  # --- VPC & Networking ---

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Project
          Value: orbweaver
        - Key: Environment
          Value: !Ref Environment

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet1CIDR
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Project
          Value: orbweaver
        - Key: Environment
          Value: !Ref Environment

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet2CIDR
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Project
          Value: orbweaver
        - Key: Environment
          Value: !Ref Environment

  # --- Internet Gateway ---

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Project
          Value: orbweaver
        - Key: Environment
          Value: !Ref Environment

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # --- Public Subnet (hosts NAT Gateway) ---

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnetCIDR
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Project
          Value: orbweaver
        - Key: Environment
          Value: !Ref Environment

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Project
          Value: orbweaver
        - Key: Environment
          Value: !Ref Environment

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # --- NAT Gateway ---

  NATElasticIP:
    Type: AWS::EC2::EIP
    DependsOn: VPCGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Project
          Value: orbweaver
        - Key: Environment
          Value: !Ref Environment

  NATGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NATElasticIP.AllocationId
      SubnetId: !Ref PublicSubnet
      Tags:
        - Key: Project
          Value: orbweaver
        - Key: Environment
          Value: !Ref Environment

  # --- Private Subnet Routing ---

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Project
          Value: orbweaver
        - Key: Environment
          Value: !Ref Environment

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      NatGatewayId: !Ref NATGateway

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # --- ElastiCache ---

  RedisSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow Redis access from within the VPC
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref RedisPort
          ToPort: !Ref RedisPort
          CidrIp: !Ref VpcCIDR
      Tags:
        - Key: Project
          Value: orbweaver
        - Key: Environment
          Value: !Ref Environment

  RedisSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: Subnet group for Orbweaver Redis
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      Tags:
        - Key: Project
          Value: orbweaver
        - Key: Environment
          Value: !Ref Environment

  RedisCluster:
    Type: AWS::ElastiCache::CacheCluster
    Properties:
      ClusterName: !Sub "orbweaver-redis-${Environment}"
      Engine: redis
      CacheNodeType: !Ref RedisNodeType
      NumCacheNodes: 1
      Port: !Ref RedisPort
      CacheSubnetGroupName: !Ref RedisSubnetGroup
      VpcSecurityGroupIds:
        - !GetAtt RedisSecurityGroup.GroupId
      Tags:
        - Key: Project
          Value: orbweaver
        - Key: Environment
          Value: !Ref Environment

  # --- SQS Queues ---

  URLQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "orbweaver-url-queue-${Environment}"
      VisibilityTimeout: !Ref URLQueueVisibilityTimeout
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt URLDeadLetterQueue.Arn
        maxReceiveCount: !Ref MaxReceiveCount
      Tags:
        - Key: Project
          Value: orbweaver
        - Key: Environment
          Value: !Ref Environment

Outputs:
  URLQueueURL:
    Description: URL of the URL queue.
    Value: !Ref URLQueue
    Export:
      Name: !Sub "orbweaver-url-queue-url-${Environment}"

  URLQueueArn:
    Description: ARN of the URL queue.
    Value: !GetAtt URLQueue.Arn
    Export:
      Name: !Sub "orbweaver-url-queue-arn-${Environment}"

  URLDeadLetterQueueURL:
    Description: URL of the URL dead-letter queue.
    Value: !Ref URLDeadLetterQueue
    Export:
      Name: !Sub "orbweaver-url-dlq-url-${Environment}"

  URLDeadLetterQueueArn:
    Description: ARN of the URL dead-letter queue.
    Value: !GetAtt URLDeadLetterQueue.Arn
    Export:
      Name: !Sub "orbweaver-url-dlq-arn-${Environment}"

  ParserQueueURL:
    Description: URL of the parser queue.
    Value: !Ref ParserQueue
    Export:
      Name: !Sub "orbweaver-parser-queue-url-${Environment}"

  ParserQueueArn:
    Description: ARN of the parser queue.
    Value: !GetAtt ParserQueue.Arn
    Export:
      Name: !Sub "orbweaver-parser-queue-arn-${Environment}"

  ParserDeadLetterQueueURL:
    Description: URL of the parser dead-letter queue.
    Value: !Ref ParserDeadLetterQueue
    Export:
      Name: !Sub "orbweaver-parser-dlq-url-${Environment}"

  ParserDeadLetterQueueArn:
    Description: ARN of the parser dead-letter queue.
    Value: !GetAtt ParserDeadLetterQueue.Arn
    Export:
      Name: !Sub "orbweaver-parser-dlq-arn-${Environment}"

  HTMLStorageBucketName:
    Description: Name of the HTML storage S3 bucket.
    Value: !Ref HTMLStorageBucket
    Export:
      Name: !Sub "orbweaver-html-storage-bucket-name-${Environment}"

  HTMLStorageBucketArn:
    Description: ARN of the HTML storage S3 bucket.
    Value: !GetAtt HTMLStorageBucket.Arn
    Export:
      Name: !Sub "orbweaver-html-storage-bucket-arn-${Environment}"

  VpcId:
    Description: VPC ID.
    Value: !Ref VPC
    Export:
      Name: !Sub "orbweaver-vpc-id-${Environment}"

  PrivateSubnet1Id:
    Description: Private subnet 1 ID.
    Value: !Ref PrivateSubnet1
    Export:
      Name: !Sub "orbweaver-private-subnet-1-id-${Environment}"

  PrivateSubnet2Id:
    Description: Private subnet 2 ID.
    Value: !Ref PrivateSubnet2
    Export:
      Name: !Sub "orbweaver-private-subnet-2-id-${Environment}"

  RedisEndpoint:
    Description: Endpoint address of the Redis cluster.
    Value: !GetAtt RedisCluster.RedisEndpoint.Address
    Export:
      Name: !Sub "orbweaver-redis-endpoint-${Environment}"

  RedisPort:
    Description: Port of the Redis cluster.
    Value: !GetAtt RedisCluster.RedisEndpoint.Port
    Export:
      Name: !Sub "orbweaver-redis-port-${Environment}"

  PublicSubnetId:
    Description: Public subnet ID.
    Value: !Ref PublicSubnet
    Export:
      Name: !Sub "orbweaver-public-subnet-id-${Environment}"

  NATGatewayId:
    Description: NAT Gateway ID.
    Value: !Ref NATGateway
    Export:
      Name: !Sub "orbweaver-nat-gateway-id-${Environment}"

  InternetGatewayId:
    Description: Internet Gateway ID.
    Value: !Ref InternetGateway
    Export:
      Name: !Sub "orbweaver-internet-gateway-id-${Environment}"
